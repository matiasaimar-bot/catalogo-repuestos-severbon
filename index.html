<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Repuestos Severbon</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#F7F8FA;color:#1A1D23;font-size:13px}
.top{background:#29ABE2;padding:10px 20px;display:flex;align-items:center;gap:14px}
.logo-s{width:46px;height:46px;border-radius:50%;overflow:hidden;flex-shrink:0;background:#fff;padding:2px}
.logo-s img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.logo-text img{height:42px;object-fit:contain;display:block;filter:none}
.top-sub{color:rgba(255,255,255,.8);font-size:11px;margin-top:3px}
.top-right{margin-left:auto}
.cart-btn{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:7px 16px;border:none;border-radius:6px;background:#fff;color:#29ABE2;cursor:pointer}
.toolbar{padding:10px 16px;display:flex;gap:7px;flex-wrap:wrap;background:#fff;border-bottom:1px solid #E2E5EA}
.toolbar input{flex:1;min-width:150px;font-size:12px;padding:7px 10px;border:1px solid #E2E5EA;border-radius:5px;outline:none}
.fbtn{font-size:11px;padding:6px 12px;border:1px solid #E2E5EA;border-radius:5px;background:#fff;cursor:pointer}
.fbtn.on{background:#E6F1FB;color:#1B6CA8;border-color:#1B6CA8;font-weight:700}
.grid{padding:14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.card{background:#fff;border:1px solid #E2E5EA;border-radius:8px;overflow:hidden;display:flex;flex-direction:column}
.card:hover{box-shadow:0 2px 10px rgba(0,0,0,.08)}
.card.in-cart{border-color:#1B6CA8;border-width:2px}
.card-img{height:130px;background:#F7F8FA;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.card-img img{max-width:100%;max-height:100%;object-fit:contain;padding:8px}
.dot{position:absolute;top:7px;right:7px;background:#1B6CA8;color:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.card-body{padding:10px 12px 12px;flex:1;display:flex;flex-direction:column}
.card-cod{font-size:10px;font-family:monospace;color:#9098A9;margin-bottom:3px}
.card-nom{font-size:12px;font-weight:700;line-height:1.35;flex:1;margin-bottom:8px}
.add-btn{width:100%;font-size:11px;font-weight:700;padding:6px;border:1px solid #E2E5EA;border-radius:5px;background:transparent;cursor:pointer}
.add-btn:hover,.add-btn.added{background:#E6F1FB;color:#1B6CA8;border-color:#1B6CA8}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:50}
.overlay.open{display:block}
.cart{display:none;position:fixed;top:0;right:0;bottom:0;width:340px;background:#fff;border-left:1px solid #E2E5EA;flex-direction:column;z-index:100}
.cart.open{display:flex}
.cart-head{padding:14px 16px;border-bottom:1px solid #E2E5EA;display:flex;align-items:center}
.cart-head-title{font-size:14px;font-weight:700;flex:1}
.close-btn{background:none;border:none;cursor:pointer;font-size:22px;color:#9098A9}
.cart-body{flex:1;overflow-y:auto;padding:12px 16px}
.ci{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #F0F0F0}
.ci:last-child{border-bottom:none}
.ci-img{width:50px;height:50px;background:#F7F8FA;border-radius:6px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.ci-img img{max-width:100%;max-height:100%;object-fit:contain;padding:4px}
.ci-info{flex:1;min-width:0}
.ci-nom{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-cod{font-size:10px;font-family:monospace;color:#9098A9}
.ci-qty{display:flex;align-items:center;gap:5px}
.qbtn{width:26px;height:26px;border:1px solid #E2E5EA;border-radius:4px;background:#F7F8FA;cursor:pointer;font-size:14px;font-weight:700}
.qnum{font-size:13px;font-weight:700;min-width:22px;text-align:center}
.del-btn{background:none;border:none;cursor:pointer;color:#9098A9;font-size:14px;padding:2px;font-weight:700}
.cart-foot{padding:14px 16px;border-top:1px solid #E2E5EA}
.flabel{font-size:11px;font-weight:700;text-transform:uppercase;color:#5A6272;margin-bottom:8px}
.finput{width:100%;font-size:12px;padding:7px 10px;border:1px solid #E2E5EA;border-radius:5px;outline:none;margin-bottom:7px}
.frow{display:flex;gap:6px;margin-bottom:7px}
.frow .finput{margin-bottom:0}
.dl-btn{width:100%;font-size:13px;font-weight:700;padding:10px;background:#1B6CA8;color:#fff;border:none;border-radius:6px;cursor:pointer;margin-top:4px}

/* ===== LAYOUT PRINCIPAL CON SIDEBAR ===== */
.main-layout{display:flex;min-height:calc(100vh - 110px)}

/* ── Sidebar izquierdo ── */
.sidebar{width:230px;min-width:230px;background:#1A1D23;color:#fff;display:flex;flex-direction:column;overflow:hidden}
.sidebar-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#9098A9;padding:14px 16px 8px;border-bottom:1px solid #2C3040}
.prod-list{overflow-y:auto;flex:1}
.prod-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:1px solid #2C3040;transition:background .15s}
.prod-item:hover{background:#252A35}
.prod-item.active{background:#1B6CA8;border-left:3px solid #29ABE2}
.prod-item.active .prod-item-cod{color:#7DC8F0}
.prod-thumb{width:42px;height:42px;border-radius:6px;background:#2C3040;flex-shrink:0;object-fit:contain;padding:3px}
.prod-item-info{flex:1;min-width:0}
.prod-item-cod{font-size:9px;font-family:monospace;color:#6A7285;margin-bottom:2px}
.prod-item-nom{font-size:11px;font-weight:600;line-height:1.3;color:#E2E5EA}

/* ── Panel derecho ── */
.content-panel{flex:1;display:flex;flex-direction:column;min-width:0;background:#F7F8FA}

/* ── Header del panel derecho ── */
.panel-header{background:#fff;border-bottom:1px solid #E2E5EA;padding:10px 16px;display:flex;align-items:center;gap:10px;min-height:54px}
.panel-header-back{font-size:12px;color:#1B6CA8;cursor:pointer;font-weight:700;display:none;align-items:center;gap:4px}
.panel-header-back.visible{display:flex}
.panel-header-title{font-size:13px;font-weight:700;color:#1A1D23}
.panel-header-sub{font-size:11px;color:#9098A9;margin-left:auto}

/* ── Vista detalle de producto individual ── */
.detail-view{display:none;flex:1;overflow-y:auto;padding:16px}
.detail-view.active{display:block}
.detail-card{background:#fff;border:1px solid #E2E5EA;border-radius:10px;overflow:hidden;max-width:480px;margin:0 auto}
.detail-img-wrap{height:240px;background:#F7F8FA;display:flex;align-items:center;justify-content:center;padding:20px}
.detail-img-wrap img{max-width:100%;max-height:100%;object-fit:contain}
.detail-body{padding:20px}
.detail-cod{font-size:11px;font-family:monospace;color:#9098A9;margin-bottom:4px}
.detail-nom{font-size:16px;font-weight:700;color:#1A1D23;margin-bottom:12px}
.detail-fam{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:3px 10px;border-radius:20px;background:#E6F1FB;color:#1B6CA8;margin-bottom:16px}
.detail-add-btn{width:100%;font-size:13px;font-weight:700;padding:10px;border:2px solid #1B6CA8;border-radius:7px;background:transparent;color:#1B6CA8;cursor:pointer;transition:all .2s}
.detail-add-btn:hover,.detail-add-btn.added{background:#1B6CA8;color:#fff}

/* ── Vista catálogo (múltiple) cuando no hay selección ── */
.catalog-view{display:none;flex:1;overflow-y:auto}
.catalog-view.active{display:block}

/* ── Pantalla de bienvenida ── */
.welcome-view{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:#9098A9;gap:8px;padding:40px}
.welcome-view.hidden{display:none}
.welcome-icon{font-size:40px;opacity:.4}
.welcome-text{font-size:13px;text-align:center}

/* ── Ajuste del grid existente dentro del panel ── */
.content-panel .grid{padding:14px}
.content-panel .toolbar{padding:10px 16px;display:flex;gap:7px;flex-wrap:wrap;background:#fff;border-bottom:1px solid #E2E5EA}
.content-panel .toolbar input{flex:1;min-width:150px;font-size:12px;padding:7px 10px;border:1px solid #E2E5EA;border-radius:5px;outline:none}

/* ── Responsive ── */
@media(max-width:600px){.sidebar{width:180px;min-width:180px}.prod-thumb{width:34px;height:34px}}

</style>

<script>
var CAT = [];
(function() {
  var raw = document.getElementById('d').textContent;
  CAT = JSON.parse(raw);
})();

var fam = 'todos';
var cart = {};

function setFam(f) {
  fam = f;
  document.querySelectorAll('.fbtn').forEach(function(b) { b.classList.remove('on'); });
  var el = document.getElementById('fb-' + f);
  if (el) el.classList.add('on');
  render();
}

function render() {
  var q = document.getElementById('q').value.toLowerCase();
  var items = CAT.filter(function(r) {
    return (fam === 'todos' || r.fam === fam) && (!q || r.nom.toLowerCase().indexOf(q) >= 0 || r.cod.indexOf(q) >= 0);
  });
  var html = '';
  items.forEach(function(r) {
    var inc = !!cart[r.cod];
    html += '<div class="card' + (inc ? ' in-cart' : '') + '">';
    html += '<div class="card-img"><img src="' + r.img + '" alt="">' + (inc ? '<div class="dot">' + cart[r.cod].qty + '</div>' : '') + '</div>';
    html += '<div class="card-body"><div class="card-cod">' + r.cod + '</div><div class="card-nom">' + r.nom + '</div>';
    html += '<button class="add-btn' + (inc ? ' added' : '') + '" onclick="toggle(\'' + r.cod + '\')">' + (inc ? '&#10003; Agregado' : '+ Agregar') + '</button>';
    html += '</div></div>';
  });
  document.getElementById('grid').innerHTML = html || '<p style="text-align:center;padding:2rem;color:#999;grid-column:1/-1">Sin resultados</p>';
}

function toggle(cod) {
  var r = null;
  CAT.forEach(function(x) { if (x.cod === cod) r = x; });
  if (!r) return;
  if (cart[cod]) delete cart[cod];
  else cart[cod] = {r: r, qty: 1};
  updateBadge();
  render();
}

function updateBadge() {
  var n = Object.keys(cart).length;
  var b = document.getElementById('badge');
  b.textContent = n;
  b.style.display = n ? 'inline-flex' : 'none';
}

function openCart() {
  document.getElementById('cart-panel').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  renderCart();
}

function closeCart() {
  document.getElementById('cart-panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

function renderCart() {
  var keys = Object.keys(cart);
  if (!keys.length) {
    document.getElementById('cart-body').innerHTML = '<p style="text-align:center;padding:2rem;color:#999">Todavia no agregaste repuestos.</p>';
    return;
  }
  var html = '';
  keys.forEach(function(cod) {
    var it = cart[cod];
    html += '<div class="ci">';
    html += '<div class="ci-img"><img src="' + it.r.img + '" alt=""></div>';
    html += '<div class="ci-info"><div class="ci-nom">' + it.r.nom + '</div><div class="ci-cod">' + cod + '</div></div>';
    html += '<div class="ci-qty">';
    html += '<button class="qbtn" onclick="chq(\'' + cod + '\',-1)">-</button>';
    html += '<span class="qnum" id="qn-' + cod + '">' + it.qty + '</span>';
    html += '<button class="qbtn" onclick="chq(\'' + cod + '\',1)">+</button>';
    html += '</div>';
    html += '<button class="del-btn" onclick="del(\'' + cod + '\')">X</button>';
    html += '</div>';
  });
  document.getElementById('cart-body').innerHTML = html;
}

function chq(cod, d) {
  if (!cart[cod]) return;
  cart[cod].qty = Math.max(1, cart[cod].qty + d);
  var el = document.getElementById('qn-' + cod);
  if (el) el.textContent = cart[cod].qty;
}

function del(cod) {
  delete cart[cod];
  updateBadge();
  renderCart();
  render();
}

function descargar() {
  var nom = document.getElementById('f-nom').value.trim();
  var tel = document.getElementById('f-tel').value.trim();
  var email = document.getElementById('f-email').value.trim();
  if (!nom || !tel || !email) { alert('Completa todos tus datos.'); return; }
  var keys = Object.keys(cart);
  if (!keys.length) { alert('El pedido esta vacio.'); return; }
  var fecha = new Date().toLocaleDateString('es-AR');
  var filas = '';
  keys.forEach(function(cod) {
    var i = cart[cod];
    filas += '<tr><td style="padding:8px 12px;border-bottom:1px solid #eee;font-family:monospace;font-size:12px;color:#666">' + cod + '</td>';
    filas += '<td style="padding:8px 12px;border-bottom:1px solid #eee">' + i.r.nom + '</td>';
    filas += '<td style="padding:8px 12px;border-bottom:1px solid #eee;text-align:center;font-weight:700">' + i.qty + '</td></tr>';
  });
  var doc = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Pedido</title>';
  doc += '<style>body{font-family:Arial,sans-serif;margin:40px}h1{font-size:20px;margin-bottom:4px}';
  doc += 'table{width:100%;border-collapse:collapse;margin-top:20px}';
  doc += 'th{background:#1B6CA8;color:#fff;padding:9px 12px;text-align:left;font-size:12px}';
  doc += '.datos{background:#f7f8fa;padding:14px;border-radius:8px;margin:16px 0;font-size:13px;line-height:1.8}';
  doc += '.nota{margin-top:24px;font-size:12px;color:#999;border-top:1px solid #eee;padding-top:16px}</style>';
  doc += '</head><body>';
  doc += '<h1>Solicitud de repuestos - Severbon</h1><p style="color:#666;font-size:13px">Fecha: ' + fecha + '</p>';
  doc += '<div class="datos">Cliente: ' + nom + '<br>Telefono: ' + tel + '<br>Email: ' + email + '</div>';
  doc += '<table><thead><tr><th>Codigo</th><th>Repuesto</th><th>Cantidad</th></tr></thead><tbody>' + filas + '</tbody></table>';
  doc += '<p class="nota">Esta solicitud no constituye una orden de compra. Un vendedor se pondra en contacto.</p>';
  doc += '</body></html>';
  var win = window.open('', '_blank');
  if (win) { win.document.write(doc); win.document.close(); setTimeout(function() { win.print(); }, 400); }
}


// ===== BORDEADORA SIDEBAR =====
var BORD_CAT = JSON.parse(document.getElementById('bd').textContent);
var activeBordCod = null;

function buildSidebar() {
  var list = document.getElementById('prod-list');
  var html = '';
  BORD_CAT.forEach(function(item) {
    html += '<div class="prod-item" id="pi-' + item.cod + '" onclick="selectProd(\'' + item.cod + '\')">';
    html += '<img class="prod-thumb" src="' + item.img + '" alt="">';
    html += '<div class="prod-item-info">';
    html += '<div class="prod-item-cod">' + item.cod + '</div>';
    html += '<div class="prod-item-nom">' + item.nom + '</div>';
    html += '</div></div>';
  });
  list.innerHTML = html;
}

function selectProd(cod) {
  // Desactivar el anterior
  if (activeBordCod) {
    var prev = document.getElementById('pi-' + activeBordCod);
    if (prev) prev.classList.remove('active');
  }
  activeBordCod = cod;
  var el = document.getElementById('pi-' + cod);
  if (el) el.classList.add('active');

  // Buscar el ítem
  var item = null;
  BORD_CAT.forEach(function(r) { if (r.cod === cod) item = r; });
  if (!item) return;

  // Mostrar detalle
  document.getElementById('welcome-view').classList.add('hidden');
  document.getElementById('detail-view').classList.add('active');

  document.getElementById('detail-img').src = item.img;
  document.getElementById('detail-nom').textContent = item.nom;
  document.getElementById('detail-cod').textContent = item.cod;
  document.getElementById('detail-header-title').textContent = item.nom;
  document.getElementById('detail-header-cod').textContent = item.cod;

  var famLabels = {
    'motor':'Motor','electrico':'Eléctrico','estructura':'Estructura',
    'corte':'Corte','proteccion':'Protección','accesorio':'Accesorio'
  };
  document.getElementById('detail-fam').textContent = famLabels[item.fam] || item.fam;

  // Estado del botón
  updateDetailBtn(cod);
}

function updateDetailBtn(cod) {
  var btn = document.getElementById('detail-add-btn');
  if (!btn) return;
  if (cart[cod]) {
    btn.textContent = '✓ Agregado (' + cart[cod].qty + ')';
    btn.classList.add('added');
  } else {
    btn.textContent = '+ Agregar al pedido';
    btn.classList.remove('added');
  }
}

function toggleFromDetail() {
  if (!activeBordCod) return;
  // Buscar item
  var item = null;
  BORD_CAT.forEach(function(r) { if (r.cod === activeBordCod) item = r; });
  if (!item) return;
  if (cart[activeBordCod]) {
    delete cart[activeBordCod];
  } else {
    cart[activeBordCod] = { r: item, qty: 1 };
  }
  updateBadge();
  updateDetailBtn(activeBordCod);
}

function closeDetail() {
  if (activeBordCod) {
    var prev = document.getElementById('pi-' + activeBordCod);
    if (prev) prev.classList.remove('active');
    activeBordCod = null;
  }
  document.getElementById('detail-view').classList.remove('active');
  document.getElementById('welcome-view').classList.remove('hidden');
}

buildSidebar();

render();
</script>
</body>
