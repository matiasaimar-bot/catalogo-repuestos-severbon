<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Repuestos Severbon</title>
<style>

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#F7F8FA;color:#1A1D23;font-size:13px}
.top{background:#29ABE2;padding:10px 20px;display:flex;align-items:center;gap:14px}
.logo-s{width:46px;height:46px;border-radius:50%;overflow:hidden;flex-shrink:0;background:#fff;padding:2px}
.logo-s img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.logo-text img{height:42px;object-fit:contain;display:block;filter:none}
.top-sub{color:rgba(255,255,255,.8);font-size:11px;margin-top:3px}
.top-right{margin-left:auto}
.cart-btn{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:7px 16px;border:none;border-radius:6px;background:#fff;color:#29ABE2;cursor:pointer}
.toolbar{padding:10px 16px;display:flex;gap:7px;flex-wrap:wrap;background:#fff;border-bottom:1px solid #E2E5EA}
.toolbar input{flex:1;min-width:150px;font-size:12px;padding:7px 10px;border:1px solid #E2E5EA;border-radius:5px;outline:none}
.fbtn{font-size:11px;padding:6px 12px;border:1px solid #E2E5EA;border-radius:5px;background:#fff;cursor:pointer}
.fbtn.on{background:#E6F1FB;color:#1B6CA8;border-color:#1B6CA8;font-weight:700}
.maq-bar{display:none;align-items:center;justify-content:space-between;background:#EAF4FC;border-bottom:1px solid #B5D4F4;padding:8px 14px;cursor:pointer}
.maq-bar-label{font-size:10px;color:#1B6CA8;text-transform:uppercase;letter-spacing:.3px}
.maq-bar-name{font-size:13px;font-weight:700;color:#1B6CA8}
.maq-bar-icon{display:flex;flex-direction:column;gap:4px}
.maq-bar-icon span{display:block;width:20px;height:2px;background:#1B6CA8;border-radius:1px}
.maq-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:100}
.maq-overlay.open{display:block}
.maq-panel{position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;z-index:101;box-shadow:0 6px 24px rgba(0,0,0,.18);transform:translateY(-100%);transition:transform .25s ease;display:flex;flex-direction:column}
.maq-panel.open{transform:translateY(0)}
.maq-panel-head{background:#1B6CA8;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.maq-panel-head span{color:#fff;font-size:14px;font-weight:700}
.maq-panel-close{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;line-height:1;padding:0}
#maq-panel-list{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;padding-bottom:40px}.maq-panel-item{display:block;width:100%;text-align:left;padding:15px 16px;border:none;background:transparent;font-size:14px;cursor:pointer;border-bottom:1px solid #E2E5EA;color:#1A1D23}
.maq-panel-item.active{background:#E6F1FB;color:#1B6CA8;font-weight:700}
.maq-panel-item:last-child{border-bottom:none}
.fbtn-row{display:flex;gap:7px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.fbtn-row::-webkit-scrollbar{display:none}
@media(max-width:600px){
  .sidebar{display:none}
  .maq-bar{display:flex}
  .toolbar{flex-wrap:nowrap;flex-direction:column;gap:6px}
  .toolbar input{min-width:0;width:100%}
  .fbtn{white-space:nowrap;flex-shrink:0}
}
.grid{padding:14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.card{background:#fff;border:1px solid #E2E5EA;border-radius:8px;overflow:hidden;display:flex;flex-direction:column}
.card:hover{box-shadow:0 2px 10px rgba(0,0,0,.08)}
.card.in-cart{border-color:#1B6CA8;border-width:2px}
.card-img{height:130px;background:#F7F8FA;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.card-img img{max-width:100%;max-height:100%;object-fit:contain;padding:8px}
.dot{position:absolute;top:7px;right:7px;background:#1B6CA8;color:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.card-body{padding:10px 12px 12px;flex:1;display:flex;flex-direction:column}
.card-cod{font-size:10px;font-family:monospace;color:#9098A9;margin-bottom:3px}
.card-nom{font-size:12px;font-weight:700;line-height:1.35;flex:1;margin-bottom:8px}
.add-btn{width:100%;font-size:11px;font-weight:700;padding:6px;border:1px solid #E2E5EA;border-radius:5px;background:transparent;cursor:pointer}
.add-btn:hover,.add-btn.added{background:#E6F1FB;color:#1B6CA8;border-color:#1B6CA8}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:50}
.overlay.open{display:block}
.cart{display:none;position:fixed;top:0;right:0;bottom:0;width:340px;background:#fff;border-left:1px solid #E2E5EA;flex-direction:column;z-index:100}
.cart.open{display:flex}
.cart-head{padding:14px 16px;border-bottom:1px solid #E2E5EA;display:flex;align-items:center}
.cart-head-title{font-size:14px;font-weight:700;flex:1}
.close-btn{background:none;border:none;cursor:pointer;font-size:22px;color:#9098A9}
.cart-body{flex:1;overflow-y:auto;padding:12px 16px}
.ci{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #F0F0F0}
.ci:last-child{border-bottom:none}
.ci-img{width:50px;height:50px;background:#F7F8FA;border-radius:6px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.ci-img img{max-width:100%;max-height:100%;object-fit:contain;padding:4px}
.ci-info{flex:1;min-width:0}
.ci-nom{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-cod{font-size:10px;font-family:monospace;color:#9098A9}
.ci-qty{display:flex;align-items:center;gap:5px}
.qbtn{width:26px;height:26px;border:1px solid #E2E5EA;border-radius:4px;background:#F7F8FA;cursor:pointer;font-size:14px;font-weight:700}.qinput{width:52px;text-align:center;border:1px solid #ddd;border-radius:4px;padding:4px 2px;font-size:14px;font-weight:600;-moz-appearance:textfield}.qinput::-webkit-outer-spin-button,.qinput::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.qnum{font-size:13px;font-weight:700;min-width:22px;text-align:center}
.del-btn{background:none;border:none;cursor:pointer;color:#9098A9;font-size:14px;padding:2px;font-weight:700}
.cart-foot{padding:14px 16px;border-top:1px solid #E2E5EA}
.flabel{font-size:11px;font-weight:700;text-transform:uppercase;color:#5A6272;margin-bottom:8px}
.finput{width:100%;font-size:12px;padding:7px 10px;border:1px solid #E2E5EA;border-radius:5px;outline:none;margin-bottom:7px}
.frow{display:flex;gap:6px;margin-bottom:7px}
.frow .finput{margin-bottom:0}
.dl-btn{width:100%;font-size:13px;font-weight:700;padding:10px;background:#1B6CA8;color:#fff;border:none;border-radius:6px;cursor:pointer;margin-top:4px}


.layout{display:flex;min-height:calc(100vh - 110px)}
.sidebar{width:200px;flex-shrink:0;background:#fff;border-right:1px solid #E2E5EA;padding:12px 0}
.sidebar-title{font-size:10px;font-weight:700;text-transform:uppercase;color:#9098A9;padding:8px 14px 4px}
.maq-btn{display:block;width:100%;text-align:left;padding:10px 14px;border:none;background:transparent;font-size:12px;cursor:pointer;color:#1A1D23;border-left:3px solid transparent}.maq-section-header{display:block;width:100%;padding:10px 14px 4px;font-size:9px;font-weight:800;text-transform:uppercase;color:#1B6CA8;letter-spacing:0.12em;margin-top:10px;border-top:1px solid #e8ecf0}.maq-group-header{display:block;width:100%;padding:9px 14px;font-size:12px;font-weight:600;color:#444;letter-spacing:0.02em;margin-top:2px;border:none;background:transparent;cursor:pointer;text-align:left;border-left:3px solid transparent}.maq-group-header:hover{background:#f0f0f0}.maq-group-arrow{float:right;font-size:10px;color:#999}.maq-sub{padding-left:26px!important;font-size:11px!important;color:#666!important}.maq-cod{display:block;font-size:10px;color:#9098A9;font-family:monospace;margin-top:1px}
.maq-btn:hover{background:#F7F8FA}
.maq-btn.active{background:#E6F1FB;color:#1B6CA8;border-left-color:#1B6CA8;font-weight:700}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

</style>
</head>

  <div class="top-right">
    <button class="cart-btn" id="cart-btn" onclick="openCart()">
      Mi pedido <span id="badge" style="display:none;background:#29ABE2;color:#fff;border:2px solid #fff;border-radius:50%;width:20px;height:20px;align-items:center;justify-content:center;font-size:11px;margin-left:4px">0</span>
    </button>
  </div>
</div>
<div class="maq-bar" id="maq-bar" onclick="openMaqPanel()">
  <div>
    <div class="maq-bar-label">Maquina</div>
    <div class="maq-bar-name" id="maq-bar-name">Todas las maquinas</div>
  </div>
  <div class="maq-bar-icon"><span></span><span></span><span></span></div>
</div>
<div id="logo-splash" style="position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;pointer-events:none;">
  <img src="https://repuestos-severbon.netlify.app/logo.png" onerror="this.style.display='none'" style="width:280px;max-width:60vw;opacity:0.08;filter:grayscale(100%);transition:opacity 1.5s ease;">
</div>
<div class="maq-overlay" id="maq-overlay" onclick="closeMaqPanel()"></div>
<div class="maq-panel" id="maq-panel">
  <div class="maq-panel-head">
    <span>Seleccionar maquina</span>
    <button class="maq-panel-close" onclick="closeMaqPanel()">&#10005;</button>
  </div>
  <div id="maq-panel-list"></div>
</div>
<div class="layout">
  <div class="sidebar">
    <div class="sidebar-title">Maquinas</div>
    <div style="padding:6px 10px 4px"><input id="q-maq" type="text" placeholder="Buscar modelo..." oninput="renderMaqList()" style="width:100%;padding:6px 10px;font-size:11px;border:1px solid #e2e5ea;border-radius:6px;outline:none;color:#333"></div>
    <div id="maq-list"></div>
  </div>
  <div class="main">
    <div class="toolbar">
      <input type="text" id="q" placeholder="Buscar por nombre o codigo..." oninput="render()">
      <div class="fbtn-row">
        <button class="fbtn on" id="fb-todos" onclick="setFam('todos')">Todos</button>
        <button class="fbtn" onclick="setFam('Motor')">Motor</button>
        <button class="fbtn" onclick="setFam('Cuchillas')">Cuchillas</button>
        <button class="fbtn" onclick="setFam('Carcasas')">Carcasas</button>
        <button class="fbtn" onclick="setFam('Ruedas')">Ruedas</button>
        <button class="fbtn" onclick="setFam('Filtros de aire')">Filtros de aire</button>
        <button class="fbtn" onclick="setFam('Manijas')">Manijas</button>
        <button class="fbtn" onclick="setFam('Bolsa recolectora')">Bolsa recolectora</button>
        <button class="fbtn" onclick="setFam('Tapa trasera')">Tapa trasera</button>
        <button class="fbtn" onclick="setFam('Salida lateral')">Salida lateral</button>
        <button class="fbtn" onclick="setFam('Capacitores')">Capacitores</button>
      </div>
    </div>
    <div class="grid" id="grid"></div>
  </div>
</div>
<div class="overlay" id="overlay" onclick="closeCart()"></div>
<div class="cart" id="cart-panel">
  <div class="cart-head">
    <span class="cart-head-title">Mi pedido</span>
    <button class="close-btn" onclick="closeCart()">X</button>
  </div>
  <div class="cart-body" id="cart-body"></div>
  <div class="cart-foot">
    <div class="flabel">Tus datos</div>
    <input class="finput" type="text" id="f-nom" placeholder="Razon Social">
    <div class="frow">
      <input class="finput" type="text" id="f-cuit" placeholder="CUIT">
      <input class="finput" type="text" id="f-tel" placeholder="Telefono">
      <input class="finput" type="text" id="f-email" placeholder="Email">
    </div>
    <button class="dl-btn" onclick="descargar()">Descargar pedido</button>
  </div>
</div>

<script>
var DATA = null;
var maqIdx = -1;
var fam = 'todos';
var cart = {};
const SUPABASE_URL = 'https://iqrtthkuhppxersziddd.supabase.co';
const SUPABASE_KEY = 'sb_publishable_D6-XAtdp_qBeyQ1o9P2h3w_5SQ1Vtzj';

async function cargarDesdeSupa() {
  const maqRes = await fetch(`${SUPABASE_URL}/rest/v1/maquinas?select=*`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  const maquinas = await maqRes.json();

  const relRes = await fetch(`${SUPABASE_URL}/rest/v1/maquina_repuesto?select=maquina_id,repuestos(*)`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  const relaciones = await relRes.json();

  const repPorMaquina = {};
  for (const rel of relaciones) {
    if (!repPorMaquina[rel.maquina_id]) repPorMaquina[rel.maquina_id] = [];
    repPorMaquina[rel.maquina_id].push(rel.repuestos);
  }

  return {
    maquinas: maquinas.map(m => ({
      id: m.id,
      nom: m.nom,
      cat: m.cat,
      repuestos: repPorMaquina[m.id] || []
    }))
  };
}

cargarDesdeSupa().then(function(d){
  // Desvanecer logo splash
  var splash = document.getElementById('logo-splash');
  if (splash) { setTimeout(function(){ splash.style.opacity='0'; setTimeout(function(){ splash.style.display='none'; }, 1500); }, 800); }
  DATA = d;
  renderMaqList();
  renderParts();
});

// Grupos desplegables abiertos/cerrados
var gruposAbiertos = { Electrica: false, Naftera: false };

function toggleGrupo(cat) {
  gruposAbiertos[cat] = !gruposAbiertos[cat];
  renderMaqList();
  // Si el panel mobile está abierto, actualizarlo también
  if (document.getElementById('maq-panel').classList.contains('open')) {
    openMaqPanel();
  }
}

// Armar lista de maquinas agrupada por categoria con desplegables
function renderMaqList() {
  var qmEl = document.getElementById('q-maq');
  var qm = qmEl ? qmEl.value.toLowerCase().trim() : '';
  var html = '<button class="maq-btn' + (maqIdx === -1 ? ' active' : '') + '" onclick="selMaq(-1)">Todas las maquinas</button>';

  // Bordeadoras y Desmalezadoras
  html += '<div class="maq-section-header">BORDEADORAS Y DESMALEZADORAS</div>';
  //
  DATA.maquinas.forEach(function(m, i) {
    if (m.id === 'dsv52' || m.id === 'bp1000') {
      if (!qm || m.nom.toLowerCase().indexOf(qm) >= 0 || m.id.indexOf(qm) >= 0) {
        html += '<button class="maq-btn' + (i === maqIdx ? ' active' : '') + '" onclick="selMaq(' + i + ')">' + m.nom + '<span class="maq-cod">' + m.id + '</span></button>';
      }
    }
  });

  // Header Cortadoras
  html += '<div class="maq-section-header">CORTADORAS DE CÉSPED</div>';

  // Header Cortadoras mobile

  // Electricas desplegable
  if (DATA.maquinas.some(function(m) { return m.cat === 'Electrica'; })) {
    var abiertaE = gruposAbiertos.Electrica;
    html += '<button class="maq-group-header" onclick="toggleGrupo(&quot;Electrica&quot;)">' +
      'Eléctricas <span class="maq-group-arrow">' + (abiertaE ? '&#9650;' : '&#9660;') + '</span></button>';
    if (abiertaE) {
      DATA.maquinas.forEach(function(m, i) {
        if (m.cat === 'Electrica' && (!qm || m.nom.toLowerCase().indexOf(qm) >= 0 || m.id.indexOf(qm) >= 0)) {
          html += '<button class="maq-btn maq-sub' + (i === maqIdx ? ' active' : '') + '" onclick="selMaq(' + i + ')">' + m.nom + '<span class="maq-cod">' + m.id + '</span></button>';
        }
      });
    }
  }

  // Nafteras desplegable
  if (DATA.maquinas.some(function(m) { return m.cat === 'Naftera'; })) {
    var abiertaN = gruposAbiertos.Naftera;
    html += '<button class="maq-group-header" onclick="toggleGrupo(&quot;Naftera&quot;)">' +
      'Nafteras <span class="maq-group-arrow">' + (abiertaN ? '&#9650;' : '&#9660;') + '</span></button>';
    if (abiertaN) {
      DATA.maquinas.forEach(function(m, i) {
        if (m.cat === 'Naftera' && (!qm || m.nom.toLowerCase().indexOf(qm) >= 0 || m.id.indexOf(qm) >= 0)) {
          html += '<button class="maq-btn maq-sub' + (i === maqIdx ? ' active' : '') + '" onclick="selMaq(' + i + ')">' + m.nom + '<span class="maq-cod">' + m.id + '</span></button>';
        }
      });
    }
  }

  document.getElementById('maq-list').innerHTML = html;
}

function selMaq(i) {
  maqIdx = i;
  renderMaqList();
  setFam('todos');
}

function setFam(f) {
  fam = f;
  document.querySelectorAll('.fbtn').forEach(function(b) {
    b.classList.remove('on');
    if (b.getAttribute('onclick') === "setFam('" + f + "')") b.classList.add('on');
  });
  var el = document.getElementById('fb-' + f);
  if (el) el.classList.add('on');
  render();
}

function render() {
  var q = document.getElementById('q').value.toLowerCase();
  var CAT;
  if (maqIdx === -1) {
    var vistos = {};
    CAT = [];
    DATA.maquinas.forEach(function(m) {
      m.repuestos.forEach(function(r) {
        if (!vistos[r.cod]) { vistos[r.cod] = true; CAT.push(r); }
      });
    });
  } else {
    CAT = DATA.maquinas[maqIdx].repuestos;
  }
  var items = CAT.filter(function(r) {
    return (fam === 'todos' || r.cat === fam) && (!q || r.nom.toLowerCase().indexOf(q) >= 0 || r.cod.indexOf(q) >= 0);
  });
  var html = '';
  items.forEach(function(r) {
    var cartItem = cart[r.cod];
    var inc = !!cartItem && (cartItem.mi === maqIdx || cartItem.mi === -1 || maqIdx === -1);
    html += '<div class="card' + (inc ? ' in-cart' : '') + '">';
    html += '<div class="card-img"><img src="' + r.img + '" alt="">' + (inc ? '<div class="dot">' + cartItem.qty + '</div>' : '') + '</div>';
    html += '<div class="card-body"><div class="card-cod">' + r.cod + '</div><div class="card-nom">' + r.nom + '</div>';
    html += '<button class="add-btn' + (inc ? ' added' : '') + '" data-cod="' + r.cod + '" data-mi="' + maqIdx + '">' + (inc ? '&#10003; Agregado' : '+ Agregar') + '</button>';
    html += '</div></div>';
  });
  document.getElementById('grid').innerHTML = html || '<p style="text-align:center;padding:2rem;color:#999;grid-column:1/-1">Sin resultados</p>';
}

document.getElementById('grid').addEventListener('click', function(e) {
  var btn = e.target.closest('.add-btn');
  if (!btn) return;
  toggle(btn.dataset.cod, btn.dataset.mi);
});

function toggle(cod, mi) {
  var r = null;
  var idx = parseInt(mi);
  if (idx === -1) {
    DATA.maquinas.forEach(function(m) { m.repuestos.forEach(function(x) { if (x.cod === cod) r = x; }); });
  } else {
    DATA.maquinas[idx].repuestos.forEach(function(x) { if (x.cod === cod) r = x; });
  }
  if (!r) return;
  if (cart[cod]) delete cart[cod];
  else cart[cod] = {r: r, qty: 1, mi: idx};
  updateBadge();
  render();
}

function updateBadge() {
  var n = Object.keys(cart).length;
  var b = document.getElementById('badge');
  b.textContent = n;
  b.style.display = n ? 'inline-flex' : 'none';
}

function openCart() {
  document.getElementById('cart-panel').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  renderCart();
}

function closeCart() {
  document.getElementById('cart-panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

function renderCart() {
  var keys = Object.keys(cart);
  if (!keys.length) {
    document.getElementById('cart-body').innerHTML = '<p style="text-align:center;padding:2rem;color:#999">Todavia no agregaste repuestos.</p>';
    return;
  }
  var html = '';
  keys.forEach(function(cod) {
    var it = cart[cod];
    html += '<div class="ci">';
    html += '<div class="ci-img"><img src="' + it.r.img + '" alt=""></div>';
    html += '<div class="ci-info"><div class="ci-nom">' + it.r.nom + '</div><div class="ci-cod">' + cod + '</div></div>';
    html += '<div class="ci-qty">';
    html += '<button class="qbtn" onclick="chq(\'' + cod + '\',-1)">-</button>';
    html += '<input class="qinput" id="qn-' + cod + '" type="number" min="1" value="' + it.qty + '" onchange="setQty(\'' + cod + '\',this.value)" oninput="setQty(\'' + cod + '\',this.value)">';
    html += '<button class="qbtn" onclick="chq(\'' + cod + '\',1)">+</button>';
    html += '</div>';
    html += '<button class="del-btn" onclick="del(\'' + cod + '\')">X</button>';
    html += '</div>';
  });
  document.getElementById('cart-body').innerHTML = html;
}

function chq(cod, d) {
  if (!cart[cod]) return;
  cart[cod].qty = Math.max(1, cart[cod].qty + d);
  var el = document.getElementById('qn-' + cod);
  if (el) el.value = cart[cod].qty;
}

function setQty(cod, val) {
  if (!cart[cod]) return;
  var n = parseInt(val);
  if (!n || n < 1) n = 1;
  cart[cod].qty = n;
  updateBadge();
}

function del(cod) {
  delete cart[cod];
  updateBadge();
  renderCart();
  render();
}

function descargar() {
  var nom = document.getElementById('f-nom').value.trim();
  var cuit = document.getElementById('f-cuit').value.trim();
  var tel = document.getElementById('f-tel').value.trim();
  var email = document.getElementById('f-email').value.trim();
  if (!nom || !cuit || !tel || !email) { alert('Completa todos tus datos.'); return; }
  var keys = Object.keys(cart);
  if (!keys.length) { alert('El pedido esta vacio.'); return; }
  var fecha = new Date().toLocaleDateString('es-AR');
  var filas = '';
  keys.forEach(function(cod) {
    var i = cart[cod];
    filas += '<tr><td style="padding:8px 12px;border-bottom:1px solid #eee;font-family:monospace;font-size:12px;color:#666">' + cod + '</td>';
    filas += '<td style="padding:8px 12px;border-bottom:1px solid #eee">' + i.r.nom + '</td>';
    filas += '<td style="padding:8px 12px;border-bottom:1px solid #eee;text-align:center;font-weight:700">' + i.qty + '</td></tr>';
  });
  var nroPedido = 'PED-' + new Date().getFullYear().toString().slice(-2) + ('0'+(new Date().getMonth()+1)).slice(-2) + ('0'+new Date().getDate()).slice(-2) + '-' + Math.floor(Math.random()*9000+1000);
  var doc = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Solicitud ' + nroPedido + ' - ' + nom + '</title>';
  doc += '<style>body{font-family:Arial,sans-serif;margin:40px}h1{font-size:20px;margin-bottom:4px}';
  doc += 'table{width:100%;border-collapse:collapse;margin-top:20px}';
  doc += 'th{background:#1B6CA8;color:#fff;padding:9px 12px;text-align:left;font-size:12px}';
  doc += '.datos{background:#f7f8fa;padding:14px;border-radius:8px;margin:16px 0;font-size:13px;line-height:1.8}';
  doc += '.nota{margin-top:24px;font-size:12px;color:#999;border-top:1px solid #eee;padding-top:16px}</style>';
  doc += '</head><body>';
  doc += '<h1>Solicitud de repuestos - Severbon</h1>';
  doc += '<p style="color:#666;font-size:13px">N\u00b0 Pedido: <strong>' + nroPedido + '</strong> &nbsp;|&nbsp; Fecha: ' + fecha + ' &nbsp;|&nbsp; Raz\u00f3n Social: <strong>' + nom + '</strong></p>';
  doc += '<div class="datos">Razon Social: ' + nom + '<br>CUIT: ' + cuit + '<br>Telefono: ' + tel + '<br>Email: ' + email + '</div>';
  doc += '<table><thead><tr><th>Codigo</th><th>Repuesto</th><th>Cantidad</th></tr></thead><tbody>' + filas + '</tbody></table>';
  doc += '<p class="nota">Esta solicitud no constituye una orden de compra. Un vendedor se pondra en contacto.</p>';
  doc += '</body></html>';
  var win = window.open('', '_blank');
  if (win) { win.document.write(doc); win.document.close(); setTimeout(function() { win.print(); }, 400); }
}

function openMaqPanel() {
  var html = '<button class="maq-panel-item' + (maqIdx === -1 ? ' active' : '') + '" onclick="selMaqMobile(-1)">Todas las maquinas</button>';

  // Bordeadora y Desmalezadora primero con header
  var tieneEspeciales = DATA.maquinas.some(function(m) { return m.id === 'dsv52' || m.id === 'bp1000'; });
  if (tieneEspeciales) {
    html += '<div class="maq-section-header" style="padding:8px 16px;">BORDEADORAS Y DESMALEZADORAS</div>';
    DATA.maquinas.forEach(function(m, i) {
      if (m.id === 'dsv52' || m.id === 'bp1000') {
        html += '<button class="maq-panel-item' + (i === maqIdx ? ' active' : '') + '" onclick="selMaqMobile(' + i + ')">' + m.nom + '</button>';
      }
    });
  }

  // Header cortadoras
  var tieneCorta = DATA.maquinas.some(function(m) { return m.cat === 'Electrica' || m.cat === 'Naftera'; });
  if (tieneCorta) {
    html += '<div class="maq-section-header" style="padding:8px 16px;">CORTADORAS DE CÉSPED</div>';
  }

  // Header Cortadoras

  // Electricas desplegable
  if (DATA.maquinas.some(function(m) { return m.cat === 'Electrica'; })) {
    var abiertaE = gruposAbiertos.Electrica;
    html += '<button class="maq-group-header" onclick="toggleGrupo(&quot;Electrica&quot;)">' +
      'Eléctricas <span class="maq-group-arrow">' + (abiertaE ? '&#9650;' : '&#9660;') + '</span></button>';
    if (abiertaE) {
      DATA.maquinas.forEach(function(m, i) {
        if (m.cat === 'Electrica') {
          html += '<button class="maq-panel-item maq-sub' + (i === maqIdx ? ' active' : '') + '" onclick="selMaqMobile(' + i + ')">' + m.nom + '</button>';
        }
      });
    }
  }

  // Nafteras desplegable
  if (DATA.maquinas.some(function(m) { return m.cat === 'Naftera'; })) {
    var abiertaN = gruposAbiertos.Naftera;
    html += '<button class="maq-group-header" onclick="toggleGrupo(&quot;Naftera&quot;)">' +
      'Nafteras <span class="maq-group-arrow">' + (abiertaN ? '&#9650;' : '&#9660;') + '</span></button>';
    if (abiertaN) {
      DATA.maquinas.forEach(function(m, i) {
        if (m.cat === 'Naftera') {
          html += '<button class="maq-panel-item maq-sub' + (i === maqIdx ? ' active' : '') + '" onclick="selMaqMobile(' + i + ')">' + m.nom + '</button>';
        }
      });
    }
  }

  document.getElementById('maq-panel-list').innerHTML = html;
  document.getElementById('maq-panel').classList.add('open');
  document.getElementById('maq-overlay').classList.add('open');
}

function toggleGrupoMobile(cat) {
  gruposAbiertos[cat] = !gruposAbiertos[cat];
  openMaqPanel();
}
function closeMaqPanel() {
  document.getElementById('maq-panel').classList.remove('open');
  document.getElementById('maq-overlay').classList.remove('open');
}
function selMaqMobile(i) {
  selMaq(i);
  document.getElementById('maq-bar-name').textContent = i === -1 ? 'Todas las maquinas' : DATA.maquinas[i].nom;
  closeMaqPanel();
}
</script>
</body>
</html>
